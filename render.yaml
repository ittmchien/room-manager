services:
  - type: web
    name: room-manager-api
    runtime: node
    region: singapore
    plan: free
    rootDir: packages/backend
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm build:shared && pnpm build:be
    startCommand: node packages/backend/dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
