<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Room Manager - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#dfe3e7",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#002109",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-primary-fixed": "#00174b",
                    "secondary-fixed": "#6bff8f",
                    "on-surface": "#171c1f",
                    "surface-container": "#eaeef2",
                    "on-primary-fixed-variant": "#003ea8",
                    "surface-container-low": "#f0f4f8",
                    "tertiary": "#943700",
                    "surface-dim": "#d6dade",
                    "outline-variant": "#c3c6d7",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#b4c5ff",
                    "secondary-fixed-dim": "#4ae176",
                    "inverse-surface": "#2c3134",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#006e2f",
                    "on-primary-container": "#eeefff",
                    "primary": "#004ac6",
                    "on-background": "#171c1f",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#ffede6",
                    "inverse-on-surface": "#edf1f5",
                    "on-secondary-fixed-variant": "#005321",
                    "surface-tint": "#0053db",
                    "surface-container-high": "#e4e9ed",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#dfe3e7",
                    "on-tertiary-fixed": "#360f00",
                    "secondary-container": "#6bff8f",
                    "surface": "#f6fafe",
                    "on-secondary-container": "#007432",
                    "surface-bright": "#f6fafe",
                    "tertiary-fixed-dim": "#ffb596",
                    "outline": "#737686",
                    "tertiary-container": "#bc4800",
                    "on-surface-variant": "#434655",
                    "on-primary": "#ffffff",
                    "background": "#f6fafe",
                    "primary-container": "#2563eb",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Be Vietnam Pro"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Inter"
                    ]
            }
    },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6fafe;
            color: #171c1f;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex flex-col items-center antialiased">
<div class="w-full max-w-md bg-surface min-h-screen flex flex-col relative shadow-2xl mx-auto overflow-hidden">
<header class="flex justify-between items-center px-6 py-4 pt-12">
<div class="flex gap-2 items-center">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<button class="text-primary font-medium text-sm px-4 py-2 hover:bg-primary/5 rounded-full transition-colors font-body">Bỏ qua</button>
</header>
<main class="flex-1 px-6 py-6 flex flex-col gap-8">
<div class="flex flex-col gap-3">
<h1 class="text-3xl font-bold font-headline text-on-surface tracking-tight leading-tight">
                    Thiết lập <br/>
<span class="text-primary">Khu trọ của bạn</span>
</h1>
<p class="text-on-surface-variant text-base font-body leading-relaxed">
                    Hãy bắt đầu bằng việc đặt tên và xác định vị trí cho khu trọ. Điều này giúp quản lý dễ dàng hơn.
                </p>
</div>
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface font-body px-1" for="propertyName">Tên khu trọ</label>
<div class="relative bg-surface-container-low rounded-xl p-1 shadow-sm">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">apartment</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-transparent border-none text-on-surface placeholder-outline focus:ring-0 text-base font-body rounded-xl" id="propertyName" placeholder="VD: The Modern Sanctuary" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface font-body px-1" for="propertyAddress">Địa chỉ</label>
<div class="relative bg-surface-container-low rounded-xl p-1 shadow-sm">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">location_on</span>
</div>
<textarea class="block w-full pl-12 pr-4 py-4 bg-transparent border-none text-on-surface placeholder-outline focus:ring-0 text-base font-body rounded-xl resize-none" id="propertyAddress" placeholder="Số nhà, Đường, Phường, Quận, Thành phố..." rows="3"></textarea>
</div>
</div>
</form>
<div class="mt-auto pb-8 pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl py-4 font-headline font-bold text-lg shadow-[0_8px_24px_rgba(0,74,198,0.25)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Tiếp tục
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</main>
<div class="absolute top-[-100px] right-[-100px] w-64 h-64 bg-primary-fixed rounded-full blur-3xl opacity-40 pointer-events-none"></div>
</div>
</body></html>
